<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Room Watch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy-950: #060D1F;
    --navy-900: #0B1730;
    --navy-800: #122145;
    --navy-700: #1B2E5C;
    --accent: #4C7EFF;
    --accent-2: #7FA8FF;
    --accent-soft: #E8EFFF;
    --ink: #0B1730;
    --muted: #5B647A;
    --line: #E4E8F2;
    --bg: #F4F6FC;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  h1, h2, .wordmark, .brand { font-family: 'Space Grotesk', 'Inter', sans-serif; }

  /* ---------- Landing ---------- */
  #landing {
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(circle at 20% 15%, var(--navy-700), var(--navy-950) 60%);
    padding: 24px;
  }
  .landing-card { max-width: 460px; width: 100%; text-align: center; }
  .eyebrow {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 1.6px;
    color: var(--accent-2); text-transform: uppercase; margin-bottom: 18px;
    padding: 6px 14px; border: 1px solid rgba(127,168,255,0.35); border-radius: 999px;
  }
  .wordmark {
    font-size: 52px; font-weight: 700; color: #fff; line-height: 1.05; margin: 0 0 10px;
    letter-spacing: -1px;
  }
  .wordmark span { color: var(--accent-2); }
  .tagline { font-size: 15px; color: rgba(255,255,255,0.65); margin: 0 0 32px; line-height: 1.5; }

  .city-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 22px; text-align: left; }
  .city-option {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 14px; padding: 14px 18px; cursor: pointer; transition: border-color .15s, background .15s;
  }
  .city-option .name { font-weight: 600; font-size: 15px; color: #fff; }
  .city-option .tag { font-size: 10px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: rgba(255,255,255,0.4); }
  .city-option.active { border-color: var(--accent); background: rgba(76,126,255,0.14); }
  .city-option.active .tag { color: var(--accent-2); }
  .city-option.disabled { cursor: not-allowed; opacity: 0.4; }
  .radio-dot {
    width: 18px; height: 18px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.3);
    display: inline-flex; align-items: center; justify-content: center; margin-right: 12px; flex-shrink: 0;
  }
  .city-option.active .radio-dot { border-color: var(--accent); }
  .city-option.active .radio-dot::after { content: ''; width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .city-name-row { display: flex; align-items: center; }

  .enter-btn {
    width: 100%; background: linear-gradient(135deg, var(--accent), #2E5CE6);
    color: #fff; border: none; border-radius: 14px; padding: 16px; font-size: 15px;
    font-weight: 700; font-family: 'Space Grotesk', sans-serif; cursor: pointer;
    box-shadow: 0 10px 30px -8px rgba(76,126,255,0.55); letter-spacing: 0.2px;
  }
  .enter-btn:hover { filter: brightness(1.06); }

  /* ---------- Dashboard ---------- */
  #dashboard { display: none; }
  header.topbar {
    background: linear-gradient(160deg, var(--navy-900), var(--navy-800) 55%, var(--navy-700));
    color: #fff; padding: 18px 24px 46px; display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  header.topbar::after {
    content: ''; position: absolute; top: -60px; right: -60px; width: 220px; height: 220px;
    background: radial-gradient(circle, rgba(76,126,255,0.35), transparent 70%); pointer-events: none;
  }
  .brand-row { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, var(--accent), var(--accent-2));
    display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
  }
  .brand { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
  .city-switch {
    font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.75); cursor: pointer;
    border: 1px solid rgba(255,255,255,0.18); padding: 6px 12px; border-radius: 999px;
    display: flex; align-items: center; gap: 6px;
  }
  .city-switch:hover { border-color: rgba(255,255,255,0.4); color: #fff; }

  .wrap { padding: 24px 24px 44px; max-width: 780px; margin: -30px auto 0; position: relative; }
