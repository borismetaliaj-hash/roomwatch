<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>St Andrews Room Watch</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f6fb; color: #1a1a1a; }
  header { background: #1B2A4A; color: #fff; padding: 18px 24px; }
  header h1 { margin: 0; font-size: 19px; }
  .wrap { padding: 20px 24px 40px; max-width: 760px; margin: 0 auto; }
  .hero { text-align: center; padding: 28px 16px; background: #fff; border: 1px solid #e2e6f0; border-radius: 14px; margin-bottom: 18px; }
  .hero .big { font-size: 48px; font-weight: 800; color: #1B2A4A; line-height: 1; }
  .hero .sub { font-size: 14px; color: #556; margin-top: 6px; }
  .hero .updated { font-size: 11px; color: #99a; margin-top: 10px; }
  .refresh-btn { background: #1B2A4A; color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 12px; font-weight: 600; cursor: pointer; margin-top: 12px; }
  .refresh-btn:disabled { opacity: 0.6; }
  .filters { display: flex; gap: 8px; margin: 18px 0 10px; flex-wrap: wrap; }
  .filter-btn { border: 1px solid #d6dcec; background: #fff; border-radius: 999px; padding: 6px 14px; font-size: 12px; font-weight: 600; color: #445; cursor: pointer; }
  .filter-btn.active { background: #1B2A4A; color: #fff; border-color: #1B2A4A; }
  .card-list { display: flex; flex-direction: column; gap: 8px; }
  .card { background: #fff; border: 1px solid #e2e6f0; border-radius: 10px; padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; gap: 10px; }
  .card-main { flex: 1; min-width: 0; }
  .card-addr { font-weight: 600; font-size: 14px; }
  .src { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.3px; padding: 2px 7px; border-radius: 5px; margin-right: 6px; }
  .src-sapl { background: #f1e6ff; color: #6a1ab0; }
  .src-brad { background: #e6f7ec; color: #1a7a3d; }
  .src-55r { background: #fff0e6; color: #b04d1a; }
  .price { font-weight: 700; font-size: 14px; color: #1B2A4A; white-space: nowrap; }
  .view-link { font-size: 12px; font-weight: 600; color: #fff; background: #1B2A4A; padding: 6px 12px; border-radius: 7px; text-decoration: none; white-space: nowrap; }
  .empty { font-size: 13px; color: #889; padding: 14px 2px; text-align: center; }
  .err-note { font-size: 11px; color: #b23; text-align: center; margin-top: 10px; }
</style>
</head>
<body>
<header><h1>St Andrews Room Watch</h1></header>
<div class="wrap">
  <div class="hero">
    <div class="big" id="bigNum">–</div>
    <div class="sub">rentals available in St Andrews right now</div>
    <div class="updated" id="updatedAt"></div>
    <div><button class="refresh-btn" id="refreshBtn" onclick="runCheck()">Refresh</button></div>
    <div class="err-note" id="errNote"></div>
  </div>
  <div class="filters" id="filters"></div>
  <div class="card-list" id="list"><div class="empty">Loading…</div></div>
</div>

<script>
let allListings = [];
let activeFilter = 'All';

function renderFilters() {
  const sources = ['All', ...new Set(allListings.map(l => l.source))];
  const el = document.getElementById('filters');
  el.innerHTML = '';
  sources.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'filter-btn' + (s === activeFilter ? ' active' : '');
    btn.textContent = s;
    btn.onclick = () => { activeFilter = s; renderFilters(); renderList(); };
    el.appendChild(btn);
  });
}

function renderList() {
  const el = document.getElementById('list');
  const items = activeFilter === 'All' ? allListings : allListings.filter(l => l.source === activeFilter);
  if (!items.length) { el.innerHTML = '<div class="empty">Nothing here right now.</div>'; return; }
  el.innerHTML = '';
  items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-main">
        <div class="card-addr"><span class="src ${item.tag}">${item.source}</span>${item.address}</div>
      </div>
      <div class="price">${item.price || ''}</div>
      <a class="view-link" href="${item.url}" target="_blank">View</a>
    `;
    el.appendChild(card);
  });
}

async function runCheck() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true; btn.textContent = 'Checking…';
  document.getElementById('errNote').textContent = '';
  try {
    const res = await fetch('/api/listings');
    const data = await res.json();
    allListings = data.listings || [];
    document.getElementById('bigNum').textContent = allListings.length;
    document.getElementById('updatedAt').textContent = 'Updated ' + new Date(data.checkedAt).toLocaleString();
    if (data.errors && data.errors.length) {
      document.getElementById('errNote').textContent = 'Some sources failed: ' + data.errors.map(e => e.source).join(', ');
    }
    renderFilters();
    renderList();
  } catch (e) {
    document.getElementById('list').innerHTML = '<div class="empty">Could not reach the server. Try refreshing.</div>';
  }
  btn.disabled = false; btn.textContent = 'Refresh';
}

runCheck();
</script>
</body>
</html>
